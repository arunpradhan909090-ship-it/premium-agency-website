<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.5" flood-color="#38BDF8" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background circle ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#silverGrad)" stroke-width="3" opacity="0.9"/>
  <path d="M 4,32 A 28,28 0 0,0 60,32" fill="none" stroke="url(#blueGrad)" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Bold E Letter -->
  <path d="M 12,16 L 36,16 L 33,23 L 20,23 L 18,30 L 30,30 L 27,37 L 16,37 L 14,48 L 38,48 L 35,55 L 7,55 Z" fill="url(#silverGrad)"/>

  <!-- Bold Z Letter -->
  <path d="M 28,24 L 56,24 L 53,31 L 34,48 L 57,48 L 54,55 L 24,55 L 27,48 L 46,31 L 25,31 Z" fill="url(#blueGrad)" filter="url(#glow)"/>
</svg>
